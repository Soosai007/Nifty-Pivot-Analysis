<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Nifty 50</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: #0f172a;
    color: white;
    display: flex;
    justify-content: center;
    padding: 40px 0;
}

.container {
    background: #1e293b;
    padding: 35px;
    border-radius: 18px;
    width: 600px;
    box-shadow: 0 0 35px rgba(0, 255, 255, 0.15);
}

h1 {
    text-align: center;
    margin-bottom: 30px;
    font-size: 28px;
    background: linear-gradient(90deg, #00f5a0, #00d9f5);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

.input-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    margin-bottom: 25px;
}

.input-group {
    display: flex;
    flex-direction: column;
}

label {
    font-size: 13px;
    margin-bottom: 6px;
    color: #94a3b8;
}

input {
    height: 42px;
    padding: 0 12px;
    border-radius: 10px;
    border: none;
    outline: none;
    background: #334155;
    color: white;
    font-size: 15px;
}

/* Remove number spinners */
input::-webkit-outer-spin-button,
input::-webkit-inner-spin-button {
  -webkit-appearance: none;
  margin: 0;
}
input[type=number] {
  -moz-appearance: textfield;
}

button {
    width: 100%;
    height: 45px;
    border-radius: 12px;
    border: none;
    background: linear-gradient(90deg, #00f5a0, #00d9f5);
    color: black;
    font-weight: bold;
    font-size: 16px;
    cursor: pointer;
}

.pivot-row {
    margin-top: 35px;
    display: grid;
    grid-template-columns: 1fr 1.2fr 1fr;
    gap: 15px;
    text-align: center;
}

.card {
    background: #0f172a;
    padding: 15px;
    border-radius: 12px;
    font-weight: bold;
}

.pivot {
    border: 2px solid #00f5a0;
    box-shadow: 0 0 15px rgba(0,245,160,0.4);
}

.value {
    display: block;
    margin-top: 6px;
    font-size: 16px;
}

/* R values (GREEN) */
.resistance {
    border-left: 4px solid #22c55e;
    background: rgba(34,197,94,0.08);
}
.resistance .value {
    color: #22c55e;
}

/* S values (RED) */
.support {
    border-left: 4px solid #ef4444;
    background: rgba(239,68,68,0.08);
}
.support .value {
    color: #ef4444;
}

.level-pairs {
    margin-top: 25px;
    display: grid;
    gap: 12px;
}

.level-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
}

.candle-section {
    margin-top: 35px;
    text-align: center;
}

canvas {
    background: #ffffff;
    border-radius: 8px;
    margin-top: 10px;
}
</style>
</head>

<body>

<div class="container">
    <h1>Nifty 50</h1>

    <div class="input-grid">
        <div class="input-group">
            <label>Open</label>
            <input type="number" id="open">
        </div>

        <div class="input-group">
            <label>High</label>
            <input type="number" id="high">
        </div>

        <div class="input-group">
            <label>Low</label>
            <input type="number" id="low">
        </div>

        <div class="input-group">
            <label>Close</label>
            <input type="number" id="close">
        </div>
    </div>

    <button onclick="calculate()">Calculate</button>

    <div class="pivot-row">
        <div class="card">L1 <span class="value" id="l1">-</span></div>
        <div class="card pivot">PIVOT <span class="value" id="pivot">-</span></div>
        <div class="card">L2 <span class="value" id="l2">-</span></div>
    </div>

    <!-- R LEFT (GREEN) | S RIGHT (RED) -->
    <div class="level-pairs">

        <div class="level-row">
            <div class="card resistance">R1 <span class="value" id="r1">-</span></div>
            <div class="card support">S1 <span class="value" id="s1">-</span></div>
        </div>

        <div class="level-row">
            <div class="card resistance">R2 <span class="value" id="r2">-</span></div>
            <div class="card support">S2 <span class="value" id="s2">-</span></div>
        </div>

        <div class="level-row">
            <div class="card resistance">R3 <span class="value" id="r3">-</span></div>
            <div class="card support">S3 <span class="value" id="s3">-</span></div>
        </div>

    </div>

    <div class="candle-section">
        <h3>Candle</h3>
        <canvas id="candleCanvas" width="180" height="300"></canvas>
    </div>

</div>

<script>
function calculate() {
    let open  = parseFloat(document.getElementById("open").value) || 0;
    let high  = parseFloat(document.getElementById("high").value) || 0;
    let low   = parseFloat(document.getElementById("low").value) || 0;
    let close = parseFloat(document.getElementById("close").value) || 0;

    let pivot = (open + high + low + close) / 4;
    let l2 = (high + low) / 2;
    let l1 = (pivot - l2) + pivot;

    let r1 = (2 * pivot) - low;
    let s1 = (2 * pivot) - high;
    let r2 = pivot + (high - low);
    let s2 = pivot - (high - low);
    let r3 = high + 2 * (pivot - low);
    let s3 = low - 2 * (high - pivot);

    document.getElementById("pivot").innerText = pivot.toFixed(2);
    document.getElementById("l1").innerText = l1.toFixed(2);
    document.getElementById("l2").innerText = l2.toFixed(2);
    document.getElementById("r1").innerText = r1.toFixed(2);
    document.getElementById("r2").innerText = r2.toFixed(2);
    document.getElementById("r3").innerText = r3.toFixed(2);
    document.getElementById("s1").innerText = s1.toFixed(2);
    document.getElementById("s2").innerText = s2.toFixed(2);
    document.getElementById("s3").innerText = s3.toFixed(2);

    drawCandle(open, high, low, close);
}

function drawCandle(open, high, low, close){
    let canvas = document.getElementById("candleCanvas");
    let ctx = canvas.getContext("2d");
    ctx.clearRect(0,0,canvas.width,canvas.height);

    if(high === low) return;

    let scale = (canvas.height - 20) / (high - low);

    function y(value){
        return canvas.height - ((value - low) * scale) - 10;
    }

    let x = canvas.width/2;

    ctx.beginPath();
    ctx.moveTo(x,y(high));
    ctx.lineTo(x,y(low));
    ctx.strokeStyle="black";
    ctx.lineWidth=2;
    ctx.stroke();

    let top = y(Math.max(open,close));
    let bottom = y(Math.min(open,close));
    let height = bottom - top;

    ctx.fillStyle = close >= open ? "#16a34a" : "#dc2626";
    ctx.fillRect(x-20, top, 40, height);
}
</script>

</body>
</html>
